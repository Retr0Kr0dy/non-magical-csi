
[platformio]
default_envs = m5-cardputer-adv

; ── Shared settings ────────────────────────────────────────────────────────
[env]
platform        = espressif32
framework       = arduino
monitor_speed   = 115200
monitor_raw     = yes
monitor_dtr     = 0
monitor_rts     = 0
lib_ldf_mode    = deep+
lib_compat_mode = off
lib_extra_dirs  = lib
extra_scripts   = post:scripts/post_build.py
build_flags =
  -DARCH_ESP32
  -DPORT_ARDUINO
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MSC_ON_BOOT=0
  -DARDUINO_USB_DFU_ON_BOOT=0
  -DNEU_USE_SGFX
  -DNEU_USE_SIC
  -DSIC_AUDIO_NO_COMPAT
  -DCSI_SENSE_VERSION=\"1.0\"
  -DKONSOLE_FW_NAME=\"csi-sense\"
  -DKONSOLE_FW_VERSION=\"1.0\"

; ── M5Stack Cardputer-ADV (primary target) ─────────────────────────────────
; ESP32-S3, ST7789 240x135 SPI, TCA8418 keyboard, ES8311 full-duplex codec
[env:m5-cardputer-adv]
board = esp32-s3-devkitc-1
build_flags =
  ${env.build_flags}
  -DBOARD_NAME=\"m5-cardputer-adv\"
  -DVARIANT_M5_CARDPUTER_ADV
  ; Display
  -DSGFX_BUS_SPI=1
  -DSGFX_DRV_ST7789=1
  -DSGFX_PIN_SCK=36
  -DSGFX_PIN_MOSI=35
  -DSGFX_PIN_MISO=-1
  -DSGFX_PIN_CS=37
  -DSGFX_PIN_DC=34
  -DSGFX_PIN_RST=33
  -DSGFX_PIN_BL=38
  -DSGFX_SPI_HZ=40000000
  -DSGFX_HAL_ARDUINO_GENERIC=1
  -DSGFX_SCRATCH_BYTES=4096
  -DSGFX_W=240
  -DSGFX_H=135
  -DSGFX_ROT=3
  -DSGFX_ST7789_COLSTART=53
  -DSGFX_ST7789_ROWSTART=40
  -DSGFX_ST7789_INVERT=1
  ; SIC board
  -DSIC_TARGET_CARDPUTER_ADV=1
  -DSIC_NO_DRV_KBD_74HC138=1
  -DSIC_DRV_KBD_TCA8418=1
  -DSIC_DRV_CODEC_ES8311=1
  -DSIC_DRV_IR_GPIO=1
  -DSIC_DRV_SD_SPI=1
  -DI2C_SDA_PIN=8
  -DI2C_SCL_PIN=9
  -DTCA8418_INT_PIN=11
  -DBAT_ADC_PIN=10
  -DBAT_DIV_K=2.0f

; ── M5Stack Cardputer v1/v1.1 (secondary target) ──────────────────────────
; ESP32-S3, ST7789 240x135 SPI, 74HC138 keyboard matrix, PDM mic + NS4168 amp
[env:m5-cardputer]
board = m5stack-stamps3
build_flags =
  ${env.build_flags}
  -DBOARD_NAME=\"m5-cardputer\"
  -DVARIANT_M5_CARDPUTER
  ; Display (same as ADV)
  -DSGFX_BUS_SPI=1
  -DSGFX_DRV_ST7789=1
  -DSGFX_PIN_SCK=36
  -DSGFX_PIN_MOSI=35
  -DSGFX_PIN_MISO=-1
  -DSGFX_PIN_CS=37
  -DSGFX_PIN_DC=34
  -DSGFX_PIN_RST=33
  -DSGFX_PIN_BL=38
  -DSGFX_SPI_HZ=40000000
  -DSGFX_HAL_ARDUINO_GENERIC=1
  -DSGFX_SCRATCH_BYTES=4096
  -DSGFX_W=240
  -DSGFX_H=135
  -DSGFX_ROT=3
  -DSGFX_ST7789_COLSTART=53
  -DSGFX_ST7789_ROWSTART=40
  -DSGFX_ST7789_INVERT=1
  ; SIC board
  -DSIC_TARGET_CARDPUTER=1
  -DSIC_DRV_MIC_PDM=1
  -DSIC_DRV_AMP_I2S=1
  -DSIC_DRV_IR_GPIO=1
  -DSIC_DRV_SD_SPI=1
  -DBAT_ADC_PIN=10
  -DBAT_DIV_K=2.0f
  -DI2C_SDA_PIN=2
  -DI2C_SCL_PIN=1
  -DKBD_SEL0=8
  -DKBD_SEL1=9
  -DKBD_SEL2=11
  -DKBD_IN0=13
  -DKBD_IN1=15
  -DKBD_IN2=3
  -DKBD_IN3=4
  -DKBD_IN4=5
  -DKBD_IN5=6
  -DKBD_IN6=7
  -DKBD_ACTIVE_LOW=1
  -DKBD_PULL=UP
