; SIC universal example.
;
; Same src/main.cpp for every board. Change only the PlatformIO environment:
;
;   pio run -e cardputer       -t upload
;   pio run -e cardputer-adv   -t upload
;   pio run -e tpager          -t upload
;
; Board-specific reality belongs in build_flags/SIC board backends, not in app code.

[platformio]
default_envs = cardputer

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
; ESP32-S3 boards such as StampS3/Cardputer expose the user console over
; native USB CDC. Without these flags PlatformIO may upload fine but Serial
; prints go to an unseen UART, making the monitor look dead.
monitor_dtr = 0
monitor_rts = 0
lib_ldf_mode = deep+
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MSC_ON_BOOT=0
  -DARDUINO_USB_DFU_ON_BOOT=0
lib_deps = ../../

[env:cardputer]
board = m5stack-stamps3
build_flags =
  ${env.build_flags}
  -DSIC_TARGET_CARDPUTER=1
  -DSIC_DRV_MIC_PDM=1
  -DSIC_DRV_AMP_I2S=1
  -DSIC_DRV_IR_GPIO=1
  -DSIC_DRV_SD_SPI=1
  ; Cardputer 74HC138 keyboard matrix, from M5Cardputer output/input lists.
  -DKBD_SEL0=8
  -DKBD_SEL1=9
  -DKBD_SEL2=11
  -DKBD_IN0=13
  -DKBD_IN1=15
  -DKBD_IN2=3
  -DKBD_IN3=4
  -DKBD_IN4=5
  -DKBD_IN5=6
  -DKBD_IN6=7
  -DKBD_ACTIVE_LOW=1
  -DKBD_PULL=UP
  ; Shared peripherals exposed to SIC internals.
  -DI2C_SDA_PIN=2
  -DI2C_SCL_PIN=1
  -DSIC_MIC_DATA=46
  -DSIC_MIC_CLK=43
  -DSIC_SPK_BCLK=41
  -DSIC_SPK_WS=43
  -DSIC_SPK_DOUT=42
  -DIR_TX_PIN=44
  -DSIC_SD_CS=12
  -DSIC_SD_MOSI=14
  -DSIC_SD_SCK=40
  -DSIC_SD_MISO=39
  -DBAT_ADC_PIN=10
  -DBAT_DIV_K=2.0f

[env:cardputer-adv]
board = esp32-s3-devkitc-1
board_build.psram = enabled
build_flags =
  ${env.build_flags}
  -DSIC_TARGET_CARDPUTER_ADV=1
  -DSIC_NO_DRV_KBD_74HC138=1
  -DSIC_DRV_KBD_TCA8418=1
  -DSIC_DRV_CODEC_ES8311=1
  -DSIC_DRV_IR_GPIO=1
  -DSIC_DRV_SD_SPI=1
  ; Official Cardputer-Adv PinMap: I2C SDA/SCL=G8/G9, TCA8418 INT=G11.
  -DI2C_SDA_PIN=8
  -DI2C_SCL_PIN=9
  -DTCA8418_INT_PIN=11
  ; ES8311 + NS4150B audio path.  Pin MCLK is not separately exposed in M5 docs.
  -DES8311_BCLK_PIN=41
  -DES8311_WS_PIN=43
  -DES8311_DOUT_PIN=42
  -DES8311_DIN_PIN=46
  ; IR, microSD, and battery ADC.
  -DIR_TX_PIN=44
  -DSIC_SD_CS=12
  -DSIC_SD_MOSI=14
  -DSIC_SD_SCK=40
  -DSIC_SD_MISO=39
  -DBAT_ADC_PIN=10
  -DBAT_DIV_K=2.0f

[env:tpager]
board = esp32-s3-devkitc-1
board_build.psram = enabled
build_flags =
  ${env.build_flags}
  -DSIC_TARGET_TPAGER=1
  -DI2C_SDA_PIN=3
  -DI2C_SCL_PIN=2
  -DTCA8418_INT_PIN=6
  -DSIC_DRV_KBD_TCA8418=1
  -DSIC_DRV_ENCODER_GPIO=1
  -DSIC_DRV_CODEC_ES8311=1
  -DSIC_DRV_BQ25896=1
  -DSIC_DRV_SD_SPI=1
  -DSIC_BATTERY_BQ27220=1
  ; SGFX display flags for projects that include SGFX beside this example.
  -DSGFX_DRV_ST7796=1
  -DSGFX_BUS_SPI=1
  -DSGFX_W=480
  -DSGFX_H=222
  -DSGFX_ROT=1
  -DSGFX_PIN_SCK=35
  -DSGFX_PIN_MOSI=34
  -DSGFX_PIN_MISO=-1
  -DSGFX_PIN_CS=38
  -DSGFX_PIN_DC=37
  -DSGFX_PIN_RST=-1
  -DSGFX_PIN_BL=42
  -DSGFX_SPI_HZ=80000000
  -DSGFX_BGR=1
  -DSGFX_INVERT=1
  -DSGFX_COLSTART=49
  -DSGFX_ROWSTART=0
  -DSGFX_MIRROR_Y=1
