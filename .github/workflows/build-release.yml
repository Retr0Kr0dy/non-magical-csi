name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string
      latest:
        description: 'Mark as latest release'
        required: false
        type: boolean
        default: true
      notes:
        description: 'Release notes'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [m5-cardputer-adv, m5-cardputer]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ matrix.env }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-${{ matrix.env }}-

      - name: Install PlatformIO
        run: pip install -U platformio

      - name: Build (${{ matrix.env }})
        run: pio run -e ${{ matrix.env }}

      - name: Locate artifact
        id: artifact
        shell: bash
        run: |
          shopt -s nullglob
          matches=(bin/non-magical-csi-*-${{ matrix.env }}.bin bin/csi-sense-*-${{ matrix.env }}.bin)
          if [ ${#matches[@]} -eq 0 ]; then
            echo "No artifact found in bin/" >&2
            ls -la bin/ || true
            exit 1
          fi
          BIN="${matches[0]}"
          echo "path=${BIN}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$BIN")" >> "$GITHUB_OUTPUT"
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.path }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          body: |
            ${{ inputs.notes }}

            Built from commit ${{ github.sha }}.
          files: artifacts/*
          draft: false
          prerelease: false
          make_latest: ${{ inputs.latest && 'true' || 'false' }}
